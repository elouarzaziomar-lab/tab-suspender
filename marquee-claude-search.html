<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:1400px;height:560px;overflow:hidden;font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0c0a02 0%,#1f1604 100%);
  display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;padding:60px}
.glow{position:absolute;width:900px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(ellipse,rgba(245,158,11,.26) 0%,transparent 60%);pointer-events:none}
.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:36px;position:relative}
.logo-row .name{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.02em}
.head{font-size:62px;font-weight:900;line-height:1.08;letter-spacing:-.035em;color:#fff;position:relative;margin-bottom:24px}
.head em{font-style:normal;background:linear-gradient(135deg,#f59e0b,#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:19px;color:rgba(255,255,255,.5);position:relative;margin-bottom:36px;font-weight:400}
.pills{display:flex;gap:12px;position:relative}
.pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:rgba(255,255,255,.82);padding:10px 18px;border-radius:22px;font-size:14px;font-weight:600}
.url{position:absolute;bottom:32px;right:48px;font-size:14px;color:rgba(255,255,255,.3);letter-spacing:.03em}
</style></head><body>
<div class="glow"></div>
<div class="logo-row"><svg viewBox="0 0 48 48" fill="none" width="44" height="44"><rect width="48" height="48" rx="11" fill="#1a1400"/><circle cx="20" cy="20" r="9" stroke="#f59e0b" stroke-width="2.5"/><line x1="26.5" y1="26.5" x2="34" y2="34" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/><path d="M22 15l-4 6h4l-4 6" stroke="#fcd34d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="name">Claude Search</span></div>
<div class="head">Search every word of<br/><em>your Claude.ai history.</em></div>
<div class="sub">Full-text search across all conversations · Find any answer in milliseconds · 100% local</div>
<div class="pills"><span class="pill">🔍 Full-text search</span><span class="pill">✦ Smart previews</span><span class="pill">📊 Activity heatmap</span><span class="pill">⌨️ Keyboard-first</span></div>
<div class="url">tabsuspender.app</div>
</body></html>
