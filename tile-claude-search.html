<!DOCTYPE html><html><head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:440px;height:280px;overflow:hidden;background:#0a0900;font-family:'Inter',sans-serif;display:flex;flex-direction:column;justify-content:space-between;padding:28px;position:relative}
.glow{position:absolute;width:360px;height:240px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(ellipse,rgba(245,158,11,.22) 0%,transparent 65%);pointer-events:none}
.top{display:flex;align-items:center;gap:10px;position:relative}
.name{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.02em}
.sub{font-size:11px;color:rgba(255,255,255,.4);margin-left:auto;letter-spacing:.02em}
.mid{position:relative}
.headline{font-size:28px;font-weight:900;color:#fff;letter-spacing:-.03em;line-height:1.1;margin-bottom:8px}
.headline em{font-style:normal;color:#f59e0b}
.pills{display:flex;gap:7px;flex-wrap:wrap}
.stats{display:flex;gap:16px;position:relative}
.stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 16px;display:flex;flex-direction:column;gap:3px}
.snum{font-size:20px;font-weight:900;line-height:1}
.slabel{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em}
</style>
</head>
<body>
<div class="glow"></div>
<div class="top"><svg viewBox="0 0 48 48" fill="none" width="36" height="36"><rect width="48" height="48" rx="11" fill="#1a1400"/><circle cx="20" cy="20" r="9" stroke="#f59e0b" stroke-width="2.5"/><line x1="26.5" y1="26.5" x2="34" y2="34" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/></svg><span class="name">Claude Search</span><span class="sub">tabsuspender.app</span></div>
<div class="mid">
  <div class="headline">Full-text search for Claude.ai <em>·</em> 100% local</div>
  <div class="pills"><span style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:5px 10px;border-radius:14px;font-size:11px;font-weight:600">🔍 Full-text search</span><span style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:5px 10px;border-radius:14px;font-size:11px;font-weight:600">✦ Smart previews</span><span style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:5px 10px;border-radius:14px;font-size:11px;font-weight:600">📊 Activity heatmap</span></div>
</div>
<div class="stats">
  <div class="stat"><div class="snum" style="color:#fcd34d">3</div><div class="slabel">results found</div></div>
  <div class="stat"><div class="snum" style="color:#fb923c">< 10ms</div><div class="slabel">search time</div></div>
</div>
</body></html>
