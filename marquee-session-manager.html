<!DOCTYPE html><html><head><meta name="robots" content="noindex"/><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:1400px;height:560px;overflow:hidden;font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0a0a14 0%,#1a1330 100%);
  display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;padding:60px}
.glow{position:absolute;width:900px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(ellipse,rgba(139,92,246,.3) 0%,transparent 60%);pointer-events:none}
.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:36px;position:relative}
.logo-row .name{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.02em}
.head{font-size:62px;font-weight:900;line-height:1.08;letter-spacing:-.035em;color:#fff;position:relative;margin-bottom:24px}
.head em{font-style:normal;background:linear-gradient(135deg,#8b5cf6,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:19px;color:rgba(255,255,255,.5);position:relative;margin-bottom:36px;font-weight:400}
.pills{display:flex;gap:12px;position:relative}
.pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:rgba(255,255,255,.82);padding:10px 18px;border-radius:22px;font-size:14px;font-weight:600}
.url{position:absolute;bottom:32px;right:48px;font-size:14px;color:rgba(255,255,255,.3);letter-spacing:.03em}
</style></head><body>
<div class="glow"></div>
<div class="logo-row"><svg viewBox="0 0 48 48" fill="none" width="44" height="44"><rect width="48" height="48" rx="11" fill="#15122a"/><rect x="12" y="21" width="25" height="15" rx="3" fill="#5d4d8c"/><rect x="13" y="17" width="23" height="15" rx="3" fill="#7a68ad"/><rect x="11" y="12" width="26" height="16" rx="3" fill="#a78bfa"/></svg><span class="name">Session Manager</span></div>
<div class="head">Save and restore<br/><em>tab groups in one click.</em></div>
<div class="sub">Export your sessions as local JSON · Never lose your workspace · 100% offline</div>
<div class="pills"><span class="pill">💾 One-click save</span><span class="pill">↺ Instant restore</span><span class="pill">⤓ JSON export</span><span class="pill">🔒 100% local</span></div>
<div class="url">tabsuspender.app</div>
</body></html>
