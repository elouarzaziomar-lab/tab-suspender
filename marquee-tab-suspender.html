<!DOCTYPE html><html><head><meta name="robots" content="noindex"/><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:1400px;height:560px;overflow:hidden;font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0a0e14 0%,#0f1b30 100%);
  display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;padding:60px}
.glow{position:absolute;width:900px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(ellipse,rgba(66,133,244,.3) 0%,transparent 60%);pointer-events:none}
.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:36px;position:relative}
.logo-row .name{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.02em}
.head{font-size:62px;font-weight:900;line-height:1.08;letter-spacing:-.035em;color:#fff;position:relative;margin-bottom:24px}
.head em{font-style:normal;background:linear-gradient(135deg,#4285f4,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:19px;color:rgba(255,255,255,.5);position:relative;margin-bottom:36px;font-weight:400}
.pills{display:flex;gap:12px;position:relative}
.pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:rgba(255,255,255,.82);padding:10px 18px;border-radius:22px;font-size:14px;font-weight:600}
.url{position:absolute;bottom:32px;right:48px;font-size:14px;color:rgba(255,255,255,.3);letter-spacing:.03em}
</style></head><body>
<div class="glow"></div>
<div class="logo-row"><svg viewBox="0 0 48 48" fill="none" width="44" height="44"><rect width="48" height="48" rx="11" fill="#4285f4"/><circle cx="30" cy="24" r="13" fill="#fff"/><circle cx="37" cy="24" r="13" fill="#4285f4"/></svg><span class="name">Tab Suspender</span></div>
<div class="head">Free up RAM.<br/><em>Suspend inactive tabs.</em></div>
<div class="sub">100% local · No tracking · Live memory dashboard · Call protection</div>
<div class="pills"><span class="pill">🧠 Memory dashboard</span><span class="pill">🎙️ Call protection</span><span class="pill">🛡 Whitelist</span><span class="pill">⚡ Pro — 7€ forever</span></div>
<div class="url">tabsuspender.app</div>
</body></html>
